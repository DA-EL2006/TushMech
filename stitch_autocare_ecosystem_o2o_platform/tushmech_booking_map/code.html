<style>
        /* Custom scrollbar for clean aesthetic */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e0e3e5;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c5c6cd;
        }
        
        /* Map Pin Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80%, 100% { transform: scale(2.5); opacity: 0; }
        }
        .pin-pulse::before {
            content: '';
            position: absolute;
            left: -50%;
            top: -50%;
            width: 200%;
            height: 200%;
            background-color: #0051d5;
            border-radius: 50%;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        /* Bottom Sheet Handle */
        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background-color: #c5c6cd;
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }
        
        /* Interactive Card State */
        .service-card {
            transition: all 0.2s ease-in-out;
        }
        .service-card:active {
            transform: scale(0.98);
        }
        .service-card.selected {
            border-color: #0051d5;
            background-color: #f7f9fb;
            box-shadow: 0 0 0 2px #0051d5, 0 4px 12px -2px rgba(0, 81, 213, 0.15);
        }
    </style>

<!-- Script for basic interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const serviceCards = document.querySelectorAll('.service-card');
            
            serviceCards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove selected class from all
                    serviceCards.forEach(c => {
                        c.classList.remove('selected');
                        c.classList.remove('border-secondary');
                        c.classList.add('border-outline-variant/60');
                        c.querySelector('h3').classList.remove('text-primary');
                        c.querySelector('h3').classList.add('text-on-surface');
                        // Reset icon colors
                        const iconContainer = c.querySelector('.rounded-full');
                        iconContainer.className = 'w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-secondary mb-unit transition-colors';
                    });
                    
                    // Add selected class to clicked
                    card.classList.add('selected');
                    card.classList.remove('border-outline-variant/60');
                    card.classList.add('border-secondary');
                    card.querySelector('h3').classList.remove('text-on-surface');
                    card.querySelector('h3').classList.add('text-primary');
                    // Update icon colors for selected
                    const selectedIconContainer = card.querySelector('.rounded-full');
                    selectedIconContainer.className = 'w-12 h-12 rounded-full bg-secondary text-on-secondary flex items-center justify-center mb-unit shadow-sm';
                });
            });
        });
    </script>
