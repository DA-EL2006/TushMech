<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Digital Diagnostic Report Creator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-error": "#ffffff",
                "error": "#ba1a1a",
                "secondary-container": "#316bf3",
                "surface-container-high": "#e6e8ea",
                "on-secondary-fixed-variant": "#003ea8",
                "surface-container-lowest": "#ffffff",
                "primary": "#000000",
                "on-tertiary-fixed-variant": "#005236",
                "surface": "#f7f9fb",
                "tertiary-container": "#002113",
                "on-tertiary-container": "#009668",
                "error-container": "#ffdad6",
                "surface-dim": "#d8dadc",
                "on-surface": "#191c1e",
                "on-secondary-container": "#fefcff",
                "inverse-surface": "#2d3133",
                "secondary-fixed": "#dbe1ff",
                "on-primary": "#ffffff",
                "on-primary-container": "#76849f",
                "tertiary": "#000000",
                "secondary": "#0051d5",
                "on-primary-fixed-variant": "#39475f",
                "inverse-primary": "#b9c7e4",
                "primary-container": "#0d1c32",
                "surface-container-low": "#f2f4f6",
                "background": "#f7f9fb",
                "surface-container": "#eceef0",
                "surface-tint": "#515f78",
                "primary-fixed-dim": "#b9c7e4",
                "on-secondary-fixed": "#00174b",
                "surface-bright": "#f7f9fb",
                "inverse-on-surface": "#eff1f3",
                "primary-fixed": "#d6e3ff",
                "on-tertiary-fixed": "#002113",
                "on-primary-fixed": "#0d1c32",
                "surface-container-highest": "#e0e3e5",
                "on-error-container": "#93000a",
                "tertiary-fixed": "#6ffbbe",
                "surface-variant": "#e0e3e5",
                "outline": "#75777e",
                "on-background": "#191c1e",
                "on-secondary": "#ffffff",
                "on-surface-variant": "#44474d",
                "secondary-fixed-dim": "#b4c5ff",
                "tertiary-fixed-dim": "#4edea3",
                "outline-variant": "#c5c6cd",
                "on-tertiary": "#ffffff"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "gutter": "24px",
                "unit": "8px",
                "margin-mobile": "16px",
                "margin-desktop": "40px",
                "touch-target-min": "48px",
                "container-max": "1280px"
        },
        "fontFamily": {
                "display-lg": [
                        "Inter"
                ],
                "body-lg": [
                        "Inter"
                ],
                "headline-lg": [
                        "Inter"
                ],
                "headline-md": [
                        "Inter"
                ],
                "label-md": [
                        "Inter"
                ],
                "headline-lg-mobile": [
                        "Inter"
                ],
                "label-sm": [
                        "Inter"
                ],
                "body-md": [
                        "Inter"
                ]
        },
        "fontSize": {
                "display-lg": [
                        "48px",
                        {
                                "lineHeight": "56px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "body-lg": [
                        "18px",
                        {
                                "lineHeight": "28px",
                                "fontWeight": "400"
                        }
                ],
                "headline-lg": [
                        "32px",
                        {
                                "lineHeight": "40px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                        }
                ],
                "headline-md": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "fontWeight": "600"
                        }
                ],
                "label-md": [
                        "14px",
                        {
                                "lineHeight": "20px",
                                "letterSpacing": "0.01em",
                                "fontWeight": "600"
                        }
                ],
                "headline-lg-mobile": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "fontWeight": "600"
                        }
                ],
                "label-sm": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "fontWeight": "500"
                        }
                ],
                "body-md": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ]
        }
},
    },
  }
</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-bright text-on-surface antialiased selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface-bright border-b border-outline-variant flex justify-between items-center px-[24px] h-[48px] z-50">
<div class="flex items-center gap-[8px]">
<div class="h-8 w-8 rounded-full overflow-hidden bg-surface-variant flex-shrink-0">
<img class="h-full w-full object-cover" data-alt="TushMech Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmsFJcVudeUXXqXL13pfqyLI_JTtUjsDus-I9skWBcYQjFKWB_gzO7UGDOl-Oc8wNOlCn5jIsMxZKASlWghn5wjte3xfRML0BDBJ0gaZjYOVX7C8LZSFUoyGSEDLS0BBb40zX952GUjfFKeD3w9s5H6_LR0b7yban_khhDDaKWUi3KYLASOs3EXe_7P7kp27c6KmmUT7GpfvWkCewSpyg0S6GFCk1r7YFn1X8hix0xaKvspyrqczg_DppWvsQnlLeTju5ubKTq4E1X"/>
</div>
<span class="font-headline-lg-mobile text-[24px] leading-[32px] font-semibold text-primary tracking-tight">TushMech</span>
</div>
<button aria-label="Notifications" class="h-[48px] w-[48px] flex items-center justify-center active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
</header>
<!-- Main Canvas (Task-Focused, BottomNav Suppressed) -->
<main class="pt-[80px] pb-[120px] px-[24px] max-w-2xl mx-auto">
<!-- Context Header -->
<div class="mb-[32px]">
<h1 class="font-headline-md text-[24px] leading-[32px] font-semibold text-primary mb-[4px]">Diagnostic Report</h1>
<p class="font-body-md text-[16px] leading-[24px] text-on-surface-variant">Vehicle: 2019 Ford F-150 (Plate: ABC-1234)</p>
</div>
<!-- Section: Inspection Checklist -->
<section class="mb-[48px]">
<h2 class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface mb-[16px]">Multi-Point Inspection</h2>
<div class="flex flex-col gap-[8px]">
<!-- Checklist Item 1 (Completed) -->
<button class="w-full flex items-center justify-between p-[16px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.02)] active:shadow-none active:scale-[0.99] transition-all touch-manipulation text-left">
<div class="flex items-center gap-[16px]">
<div class="w-8 h-8 rounded-full bg-tertiary-fixed-dim/20 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<span class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface block">Brakes &amp; Rotors</span>
<span class="font-label-sm text-[12px] leading-[16px] font-medium text-on-tertiary-container">Passed Inspection</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Checklist Item 2 (Completed) -->
<button class="w-full flex items-center justify-between p-[16px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.02)] active:shadow-none active:scale-[0.99] transition-all touch-manipulation text-left">
<div class="flex items-center gap-[16px]">
<div class="w-8 h-8 rounded-full bg-tertiary-fixed-dim/20 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div>
<span class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface block">Electrical System</span>
<span class="font-label-sm text-[12px] leading-[16px] font-medium text-on-tertiary-container">Battery 12.6V - Good</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Checklist Item 3 (Pending/Action Required) -->
<button class="w-full flex items-center justify-between p-[16px] bg-surface-container-lowest border border-secondary-container/30 rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.02)] active:shadow-none active:scale-[0.99] transition-all touch-manipulation text-left ring-1 ring-secondary-container/10">
<div class="flex items-center gap-[16px]">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center flex-shrink-0">
<!-- Empty state -->
</div>
<div>
<span class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface block">Engine &amp; Drivetrain</span>
<span class="font-label-sm text-[12px] leading-[16px] font-medium text-outline">Pending inspection</span>
</div>
</div>
<span class="material-symbols-outlined text-secondary">arrow_forward</span>
</button>
</div>
</section>
<!-- Section: OBD2 Scanner Input -->
<section class="mb-[48px]">
<h2 class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface mb-[16px]">Diagnostic Data</h2>
<div class="bg-surface-container-lowest p-[16px] border border-outline-variant rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.02)]">
<label class="block font-label-md text-[14px] leading-[20px] font-semibold text-on-surface-variant mb-[4px]" for="obd2-input">OBD2 Error Codes</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-[16px] top-1/2 -translate-y-1/2 text-outline">memory</span>
<input class="w-full h-[48px] pl-12 pr-[16px] bg-surface-bright border border-outline-variant rounded-lg font-body-md text-[16px] leading-[24px] text-on-surface focus:border-secondary focus:ring-2 focus:ring-secondary/10 outline-none transition-all uppercase placeholder:normal-case placeholder:text-outline shadow-inner" id="obd2-input" placeholder="e.g. P0300, P0420" type="text"/>
</div>
<p class="font-label-sm text-[12px] leading-[16px] font-medium text-outline mt-[8px] flex items-center gap-[4px]">
<span class="material-symbols-outlined text-[16px]">info</span> Separate multiple codes with commas
                </p>
</div>
</section>
<!-- Section: Photo Evidence Widget -->
<section class="mb-[32px]">
<div class="flex items-center justify-between mb-[16px]">
<h2 class="font-label-md text-[14px] leading-[20px] font-semibold text-on-surface">Photo Evidence</h2>
<span class="font-label-sm text-[12px] leading-[16px] font-medium text-secondary bg-secondary-container/10 px-[8px] py-[4px] rounded-full">Required</span>
</div>
<button class="w-full h-[160px] border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low flex flex-col items-center justify-center active:bg-surface-variant transition-colors touch-manipulation group">
<div class="w-12 h-12 rounded-full bg-secondary-container/10 flex items-center justify-center mb-[8px] group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<span class="font-label-md text-[14px] leading-[20px] font-semibold text-secondary">Upload Photo of Damaged Part</span>
<span class="font-label-sm text-[12px] leading-[16px] font-medium text-on-surface-variant mt-[4px]">Tap to open camera</span>
</button>
</section>
</main>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-[24px] bg-surface-bright/95 backdrop-blur-sm border-t border-outline-variant z-40 pb-[calc(24px+env(safe-area-inset-bottom))] shadow-[0_-8px_16px_rgba(0,0,0,0.02)]">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-label-md text-[14px] leading-[20px] font-semibold flex items-center justify-center gap-[8px] shadow-[0_8px_16px_rgba(0,0,0,0.1)] active:shadow-sm active:scale-[0.98] transition-all touch-manipulation relative overflow-hidden group">
<div class="absolute inset-0 border border-white/20 rounded-xl group-active:border-transparent transition-colors"></div>
<span class="material-symbols-outlined text-on-primary text-[20px]">send</span>
            Generate &amp; Send Report
        </button>
</div>
</body></html>
